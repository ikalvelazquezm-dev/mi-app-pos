<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema POS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 15px; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; text-align: center; border-radius: 12px; margin-bottom: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .btn { padding: 10px 15px; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; }
        .btn-primary { background: #667eea; }
        .btn-success { background: #51cf66; }
        .btn-danger { background: #ff6b6b; }
        .btn-warning { background: #ffa502; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .product { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; padding: 20px; }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 20px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab { flex: 1; padding: 10px; border: none; background: white; border-radius: 12px; cursor: pointer; font-weight: bold; text-align: center; }
        .tab.active { background: #667eea; color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .flex { display: flex; gap: 10px; }
        .flex-1 { flex: 1; }
        .text-center { text-align: center; }
        .mt-10 { margin-top: 10px; }
        .status { padding: 4px 12px; border-radius: 15px; font-size: 11px; color: white; font-weight: bold; }
        .status-Pendiente { background: #ffa502; }
        .status-Parcial { background: #3498db; }
        .status-Completado { background: #26de81; }
        .badge { padding: 2px 10px; border-radius: 12px; font-size: 11px; color: white; }
        .badge-success { background: #26de81; }
        .badge-warning { background: #ffa502; }
        .badge-danger { background: #ff6b6b; }
        .total-box { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .total-box h2 { font-size: 32px; }
        .progress-bar { background: #e0e0e0; border-radius: 10px; height: 8px; margin: 8px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 10px; height: 100%; transition: width 0.5s; }
        .stock-warning { background: #fff3cd; padding: 8px 12px; border-radius: 8px; margin: 5px 0; font-size: 13px; color: #856404; border-left: 4px solid #ffc107; }
        .stats-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat-card { flex: 1; background: white; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-number { font-size: 24px; font-weight: bold; color: #667eea; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏪 SISTEMA POS</h1>
        <small id="fecha"></small>
    </div>

    <div style="max-width: 800px; margin: 0 auto;">
        <div class="tabs">
            <button class="tab active" onclick="cambiarTab('productos')">📦 Productos</button>
            <button class="tab" onclick="cambiarTab('pedidos')">🛒 Pedidos</button>
            <button class="tab" onclick="cambiarTab('ventas')">💰 Ventas</button>
        </div>

        <div id="tab-productos" class="section active">
            <div id="lista-productos"></div>
            <button class="btn btn-primary" onclick="abrirModalProducto()" style="width:100%;">➕ Agregar Producto</button>
        </div>

        <div id="tab-pedidos" class="section">
            <div id="lista-pedidos"></div>
            <button class="btn btn-primary" onclick="abrirModalPedido()" style="width:100%;">🛒 Nuevo Pedido</button>
        </div>

        <div id="tab-ventas" class="section">
            <div id="lista-ventas"></div>
        </div>
    </div>

    <!-- MODAL PRODUCTO -->
    <div id="modal-producto" class="modal">
        <div class="modal-content">
            <h3>Agregar Producto</h3>
            <input type="text" id="nombre" placeholder="Nombre del producto">
            <input type="number" id="precio" placeholder="Precio" step="0.01">
            <input type="number" id="stock" placeholder="Stock inicial">
            <div class="flex mt-10">
                <button class="btn btn-danger flex-1" onclick="cerrarModal('modal-producto')">Cancelar</button>
                <button class="btn btn-success flex-1" onclick="guardarProducto()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- MODAL PEDIDO -->
    <div id="modal-pedido" class="modal">
        <div class="modal-content">
            <h3>Nuevo Pedido</h3>
            <input type="text" id="cliente" placeholder="Nombre del cliente *">
            <input type="text" id="telefono" placeholder="Teléfono">
            
            <h4 class="mt-10">Productos</h4>
            <div id="carrito" style="min-height:50px; margin:10px 0;"></div>
            
            <select id="select-producto">
                <option value="">Seleccionar producto...</option>
            </select>
            
            <div class="flex mt-10">
                <input type="number" id="cantidad" value="1" min="1" class="flex-1">
                <button class="btn btn-success flex-1" onclick="agregarCarrito()">Agregar</button>
            </div>
            
            <div style="display:flex; justify-content:space-between; font-size:18px; font-weight:bold; padding:10px; background:#f0f0f0; border-radius:8px; margin:10px 0;">
                <span>Total:</span>
                <span id="total-pedido" style="color:#667eea;">$0.00</span>
            </div>
            
            <div class="flex">
                <button class="btn btn-danger flex-1" onclick="cerrarModal('modal-pedido')">Cancelar</button>
                <button class="btn btn-success flex-1" onclick="crearPedido()">✅ Crear Pedido</button>
            </div>
        </div>
    </div>

    <!-- MODAL ENTREGA -->
    <div id="modal-entrega" class="modal">
        <div class="modal-content">
            <h3>📦 Registrar Entrega</h3>
            <div id="info-entrega"></div>
            <div id="items-entrega" class="mt-10"></div>
            <div class="flex mt-10">
                <button class="btn btn-danger flex-1" onclick="cerrarModal('modal-entrega')">Cancelar</button>
                <button class="btn btn-success flex-1" onclick="confirmarEntrega()">✅ Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        // ============ DATOS ============
        let productos = JSON.parse(localStorage.getItem('productos') || '[]');
        let pedidos = JSON.parse(localStorage.getItem('pedidos') || '[]');
        let ventas = JSON.parse(localStorage.getItem('ventas') || '[]');
        let carrito = [];
        let pedidoActual = null;

        // ============ INICIALIZAR ============
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('fecha').textContent = new Date().toLocaleString();
            setInterval(() => document.getElementById('fecha').textContent = new Date().toLocaleString(), 1000);
            mostrarProductos();
            mostrarPedidos();
            mostrarVentas();
        });

        function cambiarTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'productos') mostrarProductos();
            else if (tab === 'pedidos') mostrarPedidos();
            else if (tab === 'ventas') mostrarVentas();
        }

        function cerrarModal(id) { 
            document.getElementById(id).classList.remove('show'); 
        }

        // ============ PRODUCTOS ============
        function abrirModalProducto() {
            document.getElementById('modal-producto').classList.add('show');
            document.getElementById('nombre').value = '';
            document.getElementById('precio').value = '';
            document.getElementById('stock').value = '';
        }

        function guardarProducto() {
            const nombre = document.getElementById('nombre').value.trim();
            const precio = parseFloat(document.getElementById('precio').value);
            const stock = parseInt(document.getElementById('stock').value);
            if (!nombre || isNaN(precio) || isNaN(stock) || precio <= 0 || stock < 0) {
                alert('Completa todos los campos correctamente');
                return;
            }
            productos.push({ id: Date.now(), nombre, precio, stock });
            localStorage.setItem('productos', JSON.stringify(productos));
            cerrarModal('modal-producto');
            mostrarProductos();
            actualizarSelect();
        }

        function mostrarProductos() {
            const contenedor = document.getElementById('lista-productos');
            if (productos.length === 0) {
                contenedor.innerHTML = '<div class="card text-center">📦 No hay productos</div>';
                return;
            }
            let html = `<div class="stats-row">
                <div class="stat-card"><div class="stat-number">${productos.length}</div><div>Productos</div></div>
                <div class="stat-card"><div class="stat-number">${productos.reduce((s, p) => s + p.stock, 0)}</div><div>Stock Total</div></div>
            </div>`;
            productos.forEach(p => {
                html += `<div class="card">
                    <div class="product">
                        <div>
                            <strong>${p.nombre}</strong>
                            <div style="color:#667eea;font-weight:bold;">$${p.precio.toFixed(2)}</div>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <button class="btn btn-danger btn-sm" onclick="cambiarStock(${p.id}, -1)">−</button>
                            <span style="font-size:18px;font-weight:bold;min-width:30px;text-align:center;">${p.stock}</span>
                            <button class="btn btn-success btn-sm" onclick="cambiarStock(${p.id}, 1)">+</button>
                        </div>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function cambiarStock(id, cambio) {
            const p = productos.find(p => p.id === id);
            if (!p) return;
            if (p.stock + cambio < 0) { alert('Stock insuficiente'); return; }
            p.stock += cambio;
            localStorage.setItem('productos', JSON.stringify(productos));
            mostrarProductos();
            actualizarSelect();
        }

        // ============ PEDIDOS - SIN RESTRICCIONES ============
        function abrirModalPedido() {
            carrito = [];
            document.getElementById('modal-pedido').classList.add('show');
            actualizarSelect();
            mostrarCarrito();
            document.getElementById('cliente').value = '';
            document.getElementById('telefono').value = '';
        }

        function actualizarSelect() {
            const select = document.getElementById('select-producto');
            select.innerHTML = '<option value="">Seleccionar producto...</option>';
            productos.forEach(p => {
                select.innerHTML += `<option value="${p.id}">${p.nombre} - $${p.precio} (Stock: ${p.stock})</option>`;
            });
        }

        function agregarCarrito() {
            const id = parseInt(document.getElementById('select-producto').value);
            const cantidad = parseInt(document.getElementById('cantidad').value);
            
            if (!id || isNaN(cantidad) || cantidad < 1) { 
                alert('Selecciona un producto y una cantidad válida'); 
                return; 
            }
            
            const producto = productos.find(p => p.id === id);
            if (!producto) return;

            // ✅ AGREGAR SIN IMPORTAR EL STOCK
            const existente = carrito.find(i => i.productoId === id);
            if (existente) {
                existente.cantidad += cantidad;
            } else {
                carrito.push({ 
                    productoId: id, 
                    nombre: producto.nombre, 
                    precio: producto.precio, 
                    cantidad: cantidad, 
                    entregado: 0 
                });
            }

            document.getElementById('select-producto').value = '';
            document.getElementById('cantidad').value = 1;
            mostrarCarrito();
            
            // ⚠️ SOLO ADVERTENCIA
            if (producto.stock < cantidad) {
                alert('⚠️ ADVERTENCIA: Stock insuficiente. Solo hay ' + producto.stock + ' unidades disponibles.');
            }
        }

        function mostrarCarrito() {
            const contenedor = document.getElementById('carrito');
            if (carrito.length === 0) {
                contenedor.innerHTML = '<p style="color:#999;text-align:center;">Carrito vacío</p>';
                document.getElementById('total-pedido').textContent = '$0.00';
                return;
            }
            let total = 0;
            let html = '';
            carrito.forEach((item, i) => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                const prod = productos.find(p => p.id === item.productoId);
                const stock = prod ? prod.stock : 0;
                const sinStock = stock < item.cantidad;
                
                html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;">
                    <div>
                        <strong>${item.nombre}</strong>
                        <div style="font-size:12px;color:#999;">${item.cantidad} x $${item.precio.toFixed(2)}</div>
                        ${sinStock ? `<div style="font-size:11px;color:#ff6b6b;">⚠️ Stock: ${stock}</div>` : `<div style="font-size:11px;color:#26de81;">✅ Stock: ${stock}</div>`}
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <strong>$${subtotal.toFixed(2)}</strong>
                        <button onclick="quitarCarrito(${i})" style="background:none;border:none;color:#ff6b6b;font-size:20px;cursor:pointer;">✕</button>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
            document.getElementById('total-pedido').textContent = '$' + total.toFixed(2);
        }

        function quitarCarrito(index) { 
            carrito.splice(index, 1); 
            mostrarCarrito(); 
        }

        // ✅ CREAR PEDIDO - SIEMPRE PERMITE
        function crearPedido() {
            const cliente = document.getElementById('cliente').value.trim();
            if (!cliente) { 
                alert('❌ El nombre del cliente es obligatorio'); 
                return; 
            }
            if (carrito.length === 0) { 
                alert('❌ Agrega al menos un producto'); 
                return; 
            }

            let total = 0;
            carrito.forEach(i => total += i.precio * i.cantidad);

            // ✅ CREAR PEDIDO SIN VERIFICAR STOCK
            pedidos.push({
                id: Date.now(),
                cliente: cliente,
                telefono: document.getElementById('telefono').value.trim(),
                items: carrito.map(i => ({...i})),
                total: total,
                estado: 'Pendiente',
                fecha: new Date().toISOString(),
                fechaCompletado: null
            });
            localStorage.setItem('pedidos', JSON.stringify(pedidos));
            
            alert('✅ Pedido creado exitosamente!\n\n' + 
                  'Cliente: ' + cliente + '\n' +
                  'Total: $' + total.toFixed(2));
            
            cerrarModal('modal-pedido');
            carrito = [];
            mostrarPedidos();
        }

        function mostrarPedidos() {
            const contenedor = document.getElementById('lista-pedidos');
            const activos = pedidos.filter(p => p.estado === 'Pendiente' || p.estado === 'Parcial');
            
            if (activos.length === 0) {
                contenedor.innerHTML = '<div class="card text-center">🛒 No hay pedidos activos</div>';
                return;
            }
            
            let html = `<div class="stats-row">
                <div class="stat-card"><div class="stat-number">${activos.length}</div><div>Pedidos Activos</div></div>
            </div>`;
            
            activos.reverse().forEach(p => {
                const entregado = p.items.reduce((s, i) => s + i.entregado, 0);
                const total = p.items.reduce((s, i) => s + i.cantidad, 0);
                const prog = total > 0 ? Math.round((entregado/total)*100) : 0;
                
                // Verificar si hay stock insuficiente
                let sinStock = false;
                p.items.forEach(i => {
                    const prod = productos.find(pr => pr.id === i.productoId);
                    if (prod && prod.stock < (i.cantidad - i.entregado)) sinStock = true;
                });
                
                html += `<div class="card">
                    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px;">
                        <div>
                            <strong style="font-size:16px;">${p.cliente}</strong>
                            ${p.telefono ? `<div style="font-size:12px;color:#999;">📞 ${p.telefono}</div>` : ''}
                            <div style="font-size:11px;color:#aaa;">${new Date(p.fecha).toLocaleString()}</div>
                        </div>
                        <span class="status status-${p.estado}">${p.estado}</span>
                    </div>
                    
                    ${sinStock ? `<div class="stock-warning">⚠️ Stock insuficiente para completar la entrega</div>` : ''}
                    
                    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;"></div></div>
                    <div style="font-size:12px;color:#999;margin:5px 0;">Entregado: ${entregado}/${total} (${prog}%)</div>
                    
                    ${p.items.map(i => {
                        const prod = productos.find(pr => pr.id === i.productoId);
                        const stock = prod ? prod.stock : 0;
                        const pendiente = i.cantidad - i.entregado;
                        const sinStockItem = stock < pendiente && pendiente > 0;
                        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:#f8f9fa;border-radius:5px;margin:5px 0;">
                            <div>
                                <strong>${i.nombre}</strong>
                                <div style="font-size:12px;color:#999;">Pedido: ${i.cantidad} | Entregado: ${i.entregado}</div>
                                ${sinStockItem ? `<div style="font-size:11px;color:#ff6b6b;">⚠️ Stock: ${stock}</div>` : ''}
                            </div>
                            <div style="text-align:right;">
                                <div>$${(i.precio*i.cantidad).toFixed(2)}</div>
                                ${i.entregado >= i.cantidad ? '<span style="color:#26de81;">✅</span>' : i.entregado > 0 ? '<span style="color:#ffa502;">🔄</span>' : '<span style="color:#999;">⏳</span>'}
                            </div>
                        </div>`;
                    }).join('')}
                    
                    <div style="border-top:2px solid #eee;padding-top:10px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;">
                        <strong style="font-size:18px;color:#667eea;">Total: $${p.total.toFixed(2)}</strong>
                        <div style="display:flex;gap:5px;">
                            <button class="btn btn-primary btn-sm" onclick="abrirEntrega(${p.id})">📦 Entregar</button>
                            ${p.estado === 'Pendiente' ? `<button class="btn btn-danger btn-sm" onclick="cancelarPedido(${p.id})">❌</button>` : ''}
                        </div>
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        // ============ ENTREGAS ============
        function abrirEntrega(pedidoId) {
            const pedido = pedidos.find(p => p.id === pedidoId);
            if (!pedido) return;
            pedidoActual = pedidoId;
            
            document.getElementById('info-entrega').innerHTML = `
                <div style="background:#f0f0f0;padding:10px;border-radius:8px;">
                    <strong>${pedido.cliente}</strong>
                    <div style="font-size:12px;color:#999;">${new Date(pedido.fecha).toLocaleString()}</div>
                </div>
            `;
            
            let html = '';
            pedido.items.forEach(i => {
                const pendiente = i.cantidad - i.entregado;
                if (pendiente <= 0) {
                    html += `<div style="padding:10px;background:#f8f9fa;border-radius:8px;margin:5px 0;opacity:0.5;">
                        <strong>${i.nombre}</strong> ✅ Completado
                    </div>`;
                    return;
                }
                const prod = productos.find(p => p.id === i.productoId);
                const stock = prod ? prod.stock : 0;
                
                html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:#f8f9fa;border-radius:8px;margin:5px 0;">
                    <div>
                        <strong>${i.nombre}</strong>
                        <div style="font-size:12px;color:#999;">Pendiente: ${pendiente} de ${i.cantidad}</div>
                        ${stock < pendiente ? `<div style="font-size:11px;color:#ff6b6b;">⚠️ Stock: ${stock}</div>` : `<div style="font-size:11px;color:#26de81;">✅ Stock: ${stock}</div>`}
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <input type="number" id="entrega-${i.productoId}" value="${Math.min(pendiente, stock)}" min="0" max="${pendiente}" style="width:70px;padding:8px;text-align:center;border:2px solid #ddd;border-radius:8px;">
                        <span style="font-size:12px;">/ ${pendiente}</span>
                    </div>
                </div>`;
            });
            document.getElementById('items-entrega').innerHTML = html;
            document.getElementById('modal-entrega').classList.add('show');
        }

        function confirmarEntrega() {
            if (!pedidoActual) return;
            const pedido = pedidos.find(p => p.id === pedidoActual);
            if (!pedido) return;
            
            let algo = false;
            let errores = [];
            
            pedido.items.forEach(i => {
                const pendiente = i.cantidad - i.entregado;
                if (pendiente <= 0) return;
                
                const input = document.getElementById('entrega-' + i.productoId);
                if (!input) return;
                const cant = parseInt(input.value) || 0;
                
                if (cant > 0) {
                    const prod = productos.find(p => p.id === i.productoId);
                    if (prod) {
                        if (prod.stock >= cant) {
                            prod.stock -= cant;
                            i.entregado += cant;
                            algo = true;
                            ventas.push({
                                id: Date.now() + Math.random(),
                                pedidoId: pedido.id,
                                producto: i.nombre,
                                cantidad: cant,
                                precio: i.precio,
                                total: i.precio * cant,
                                cliente: pedido.cliente,
                                fecha: new Date().toISOString()
                            });
                        } else {
                            errores.push(`${i.nombre}: solo hay ${prod.stock} disponibles (necesitas ${cant})`);
                        }
                    }
                }
            });
            
            if (errores.length > 0) {
                alert('❌ No se pudo completar la entrega:\n' + errores.join('\n'));
                return;
            }
            
            if (!algo) {
                alert('⚠️ Entrega al menos un producto');
                return;
            }
            
            const completo = pedido.items.every(i => i.entregado >= i.cantidad);
            pedido.estado = completo ? 'Completado' : 'Parcial';
            if (completo) pedido.fechaCompletado = new Date().toISOString();
            
            localStorage.setItem('productos', JSON.stringify(productos));
            localStorage.setItem('pedidos', JSON.stringify(pedidos));
            localStorage.setItem('ventas', JSON.stringify(ventas));
            
            cerrarModal('modal-entrega');
            mostrarPedidos();
            mostrarProductos();
            mostrarVentas();
            
            alert(completo ? '✅ ¡Pedido completado!' : '✅ Entrega parcial registrada');
        }

        function cancelarPedido(id) {
            if (!confirm('¿Cancelar este pedido?')) return;
            const pedido = pedidos.find(p => p.id === id);
            if (pedido) {
                pedido.items.forEach(i => {
                    if (i.entregado > 0) {
                        const prod = productos.find(p => p.id === i.productoId);
                        if (prod) prod.stock += i.entregado;
                    }
                });
                pedido.estado = 'Cancelado';
                localStorage.setItem('productos', JSON.stringify(productos));
                localStorage.setItem('pedidos', JSON.stringify(pedidos));
                localStorage.setItem('ventas', JSON.stringify(ventas));
                mostrarPedidos();
                mostrarProductos();
            }
        }

        // ============ VENTAS ============
        function mostrarVentas() {
            const contenedor = document.getElementById('lista-ventas');
            const total = ventas.reduce((s, v) => s + v.total, 0);
            const unidades = ventas.reduce((s, v) => s + v.cantidad, 0);
            
            if (ventas.length === 0) {
                contenedor.innerHTML = `
                    <div class="total-box">
                        <div>Total Recaudado</div>
                        <h2>$0.00</h2>
                        <div style="font-size:14px;opacity:0.9;">0 unidades vendidas</div>
                    </div>
                    <div class="card text-center">💰 No hay ventas registradas</div>
                `;
                return;
            }
            
            let html = `
                <div class="total-box">
                    <div>Total Recaudado</div>
                    <h2>$${total.toFixed(2)}</h2>
                    <div style="font-size:14px;opacity:0.9;">${unidades} unidades vendidas</div>
                </div>
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-number">$${ventas.filter(v => new Date(v.fecha).toLocaleDateString() === new Date().toLocaleDateString()).reduce((s, v) => s + v.total, 0).toFixed(2)}</div>
                        <div>Ventas Hoy</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${ventas.length}</div>
                        <div>Transacciones</div>
                    </div>
                </div>
            `;
            
            const agrupadas = {};
            ventas.forEach(v => {
                const f = new Date(v.fecha).toLocaleDateString();
                if (!agrupadas[f]) agrupadas[f] = { ventas: [], total: 0 };
                agrupadas[f].ventas.push(v);
                agrupadas[f].total += v.total;
            });
            
            Object.entries(agrupadas).reverse().forEach(([f, g]) => {
                html += `<div class="card">
                    <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
                        <div><strong>📅 ${f}</strong><div style="font-size:12px;color:#999;">${g.ventas.length} transacciones</div></div>
                        <strong style="color:#26de81;font-size:18px;">$${g.total.toFixed(2)}</strong>
                    </div>
                    ${g.ventas.map(v => `
                        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px;">
                            <div>
                                <strong>${v.producto}</strong>
                                <div style="font-size:11px;color:#999;">${v.cliente} | ${new Date(v.fecha).toLocaleTimeString()}</div>
                            </div>
                            <div style="text-align:right;">
                                <div>${v.cantidad} x $${v.precio.toFixed(2)}</div>
                                <strong style="color:#26de81;">$${v.total.toFixed(2)}</strong>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            });
            
            contenedor.innerHTML = html;
        }
    </script>
</body>
